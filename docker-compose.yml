services:
  redis:
    image: redis:7-alpine
    restart: always
    ports:
      - "6379:6379"

  db:
    image: postgres:16
    env_file:
      - ./back/.env.production
    environment:
      - DJANGO_ENV=production
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./back
      dockerfile: Dockerfile.backend
    restart: always
    env_file:
      - ./back/.env.production
    environment:
      - DJANGO_ENV=production
    sysctls:
      - net.ipv6.conf.all.disable_ipv6=1
    volumes:
      - ./back:/app
    ports:
      - "8080:8000"
    depends_on:
      redis:
        condition: service_started
      db:
        condition: service_healthy
    command: >
      sh -c "python manage.py migrate &&
             daphne -b 0.0.0.0 -p 8000 back.asgi:application"

  worker:
    build:
      context: ./back
      dockerfile: Dockerfile.backend
    restart: always
    env_file:
      - ./back/.env.production
    environment:
      - DJANGO_ENV=production
    sysctls:
      - net.ipv6.conf.all.disable_ipv6=1
    volumes:
      - ./back:/app
    depends_on:
      db:
        condition: service_healthy
    command: python manage.py qcluster

  frontend:
    build:
      context: ./front
      dockerfile: Dockerfile.frontend
    restart: always
    ports:
      - "5173:5173"
    depends_on:
      - backend

volumes:
  postgres_data:

networks:
  default:
    driver: bridge
    enable_ipv6: false